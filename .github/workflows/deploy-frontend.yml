name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    # Only rebuild when the frontend (or this workflow) changes.
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Permissions required by the official GitHub Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Served from the custom domain www.geobioguessr.com at the root, so the
          # base path is '/'. (If you ever drop the custom domain and serve from
          # https://progkiryu.github.io/Geobioguessr/, change this back to
          # '/Geobioguessr/' so asset URLs include the repo-name subpath.)
          BASE_PATH: /
          # NOTE: the backend API base (VITE_API_URL) is read from the committed
          # apps/frontend/.env.production by Vite's production mode. Do NOT set it
          # here as a shell env var / repo Variable: an unset Variable resolves to
          # an empty string, which (having highest precedence in Vite) would
          # override .env.production and silently break the build to the '/api'
          # fallback. To change the backend URL, edit .env.production.
        run: pnpm build

      - name: Add SPA fallback for client-side routing
        # GitHub Pages has no server-side rewrites; serving index.html as 404.html
        # lets deep links (e.g. /daily) and refreshes reach the React router.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
